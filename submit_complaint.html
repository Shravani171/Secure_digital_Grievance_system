<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Grievance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0a3d62; --accent: #f6b93b; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .camera-box {
            border: 2px dashed var(--primary);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            background: #f0f4f8;
            margin-bottom: 10px;
        }
        .camera-box:hover { background: #e2e8f0; }
        #imagePreview { width: 100%; margin-top: 15px; border-radius: 8px; display: none; }

        #map {
            height: 250px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: none; 
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #0d4d7d; transform: translateY(-2px); }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .status-pending { background: #ffeaa7; color: #d35400; } /* Yellow for In Process */
        .status-submitted { background: #a29bfe; color: #2d3436; } /* Purple for Submitted */
        .status-solved { background: #55efc4; color: #00b894; } /* Green for Solved */

        #smsNotification {
            position: fixed;
            top: 20px;
            right: -400px;
            width: 300px;
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.5s;
            z-index: 9999;
        }
        .sms-header { font-size: 12px; color: var(--accent); margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="smsNotification">
    <div class="sms-header"><i class="fas fa-comment"></i> MESSAGES (Now)</div>
    <div id="smsBody">Your complaint has been submitted!</div>
</div>

<div class="form-container" data-aos="fade-up">
    <h2><i class="fas fa-file-invoice"></i> File a Grievance</h2>
    
    <form id="grievanceForm">
        <div class="form-group">
            <label>Category of Issue</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Drainage">Drainage Problem</option>
                <option value="Garbage">Garbage Collection</option>
                <option value="Potholes">Potholes / Road Damage</option>
                <option value="Electricity">Electricity / Streetlight</option>
                <option value="Water">Water Leakage</option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Explain the issue..." required></textarea>
        </div>

        <div class="form-group">
            <label>Evidence & Location</label>
            <div class="camera-box" onclick="document.getElementById('cameraInput').click()">
                <i class="fas fa-camera fa-2x" style="color: var(--primary)"></i>
                <p>Click to take photo of the problem</p>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden onchange="previewImage(event)">
                <img id="imagePreview" alt="Preview">
            </div>
            
            <div id="map"></div>
            <p id="locationText" style="font-size: 12px; color: #666; margin-top: 5px;">
                <i class="fas fa-location-crosshairs"></i> Detecting live location...
            </p>
        </div>

        <div class="form-group">
            <label>Status: <span id="currentStatus" class="status-badge status-pending">IN PROCESS</span></label>
        </div>

        <button type="submit" class="submit-btn">Submit Complaint</button>
    </form>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    
    AOS.init();

    let map;

    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                document.getElementById('locationText').innerHTML = `<i class="fas fa-check-circle" style="color:green"></i> Location Locked: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                document.getElementById('map').style.display = "block";
                map = L.map('map').setView([lat, lon], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
                L.marker([lat, lon]).addTo(map).bindPopup('<b>Problem Location</b>').openPopup();
            }, (error) => {
                document.getElementById('locationText').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:red"></i> Please enable GPS.`;
            });
        }
    }

    window.onload = initGPS;

    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('imagePreview');
            output.src = reader.result;
            output.style.display = "block";
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    const form = document.getElementById('grievanceForm');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 1. CHANGE STATUS TO 'SUBMITTED' IMMEDIATELY ON CLICK
        const statusLabel = document.getElementById('currentStatus');
        statusLabel.textContent = "SUBMITTED";
        statusLabel.className = "status-badge status-submitted";

        // Show SMS
        showSMS("SUCCESS: Your complaint regarding " + document.getElementById('category').value + " has been successfully submitted. ID: #GR8829");

        // 2. Simulating a 'Solved' status after 6 seconds
       setTimeout(() => {
            statusLabel.textContent = "SOLVED";
            statusLabel.className = "status-badge status-solved";
            showSMS("UPDATE: Your complaint ID #GR8829 has been RESOLVED.");
        }, 6000); 
    });

    function showSMS(message) {
        const sms = document.getElementById('smsNotification');
        const body = document.getElementById('smsBody');
        body.innerText = message;
        sms.style.right = "20px"; 
        setTimeout(() => { sms.style.right = "-400px"; }, 4500);
    }
</script>

</body>
</html>
