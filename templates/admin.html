<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Demo Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; height: 100vh; background: #0a3d62; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 270px; padding: 30px; width: calc(100% - 300px); }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card h3 { font-size: 2rem; margin: 5px 0; color: #0a3d62; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #0a3d62; color: white; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: capitalize; }
        .submitted, .pending { background: #fff4e5; color: #ff9800; }
        .resolved { background: #e6fcf5; color: #0ca678; }
        .btn-resolve { background: #0a3d62; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-resolve:hover { background: #f6b93b; color: #0a3d62; }

        /* --- Admin Visual Feedback (System Log) --- */
        #notificationBox {
            position: fixed;
            top: 20px;
            right: -350px;
            width: 320px;
            background: #1e1e1e;
            color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 5px solid #f6b93b;
        }
        .noti-header { display: flex; justify-content: space-between; font-size: 12px; color: #f6b93b; margin-bottom: 5px; }
        .noti-body { font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="notificationBox">
    <div class="noti-header">
        <span><i class="fas fa-server"></i> SYSTEM LOG</span>
        <span>Just Now</span>
    </div>
    <div class="noti-body" id="notiMsg">
        Processing resolution...
    </div>
</div>

<div class="sidebar">
    <h2><i class="fas fa-user-shield"></i> Admin Panel</h2>
    <hr>
    <p><i class="fas fa-home"></i> <a href="index.html" style="color:white; text-decoration:none;">Go to Home</a></p>
    <p><i class="fas fa-sign-out-alt"></i> <a href="#" onclick="localStorage.clear(); window.location.href='index.html'" style="color:white; text-decoration:none;">Logout</a></p>
</div>

<div class="main">
    <h1>Grievance Dashboard <small>(Demo Mode)</small></h1>
    
    <div class="stats">
        <div class="card"><h3 id="totalCount">0</h3><p>Total</p></div>
        <div class="card"><h3 id="pendingCount" style="color:orange">0</h3><p>Pending</p></div>
        <div class="card"><h3 id="resolvedCount" style="color:green">0</h3><p>Resolved</p></div>
    </div>

    <h3>Recent Complaints</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Category</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dummyTableBody"></tbody>
    </table>
</div>

<script>
    // 1. DATA CONFIGURATION
    const defaultComplaints = [
        { id: 101, email: "suresh@gmail.com", category: "Potholes", status: "Submitted" },
        { id: 102, email: "rahul@yahoo.com", category: "Electricity", status: "Resolved" },
        { id: 103, email: "priya@outlook.com", category: "Water Supply", status: "Submitted" },
        { id: 104, email: "amit@gmail.com", category: "Garbage", status: "Submitted" },
        { id: 105, email: "sneha@gmail.com", category: "Drainage", status: "Resolved" },
        { id: 106, email: "vijay@live.com", category: "Potholes", status: "Submitted" }
    ];

    // 2. DASHBOARD LOGIC
    function loadDashboard() {
        let userComplaints = JSON.parse(localStorage.getItem("allComplaints")) || [];
        let allData = [...defaultComplaints, ...userComplaints];

        const tableBody = document.getElementById('dummyTableBody');
        tableBody.innerHTML = "";

        let total = allData.length;
        let pending = 0;
        let resolved = 0;

        allData.forEach((item, index) => {
            const statusType = item.status ? item.status.toLowerCase() : 'submitted';
            if(statusType === "submitted" || statusType === "pending") pending++;
            else resolved++;

            tableBody.innerHTML += `
                <tr>
                    <td>#${item.id}</td>
                    <td>${item.email || item.user}</td>
                    <td>${item.category}</td>
                    <td><span class="status ${statusType}">${item.status}</span></td>
                    <td>
                        ${statusType !== "resolved" ? `<button class="btn-resolve" onclick="resolveMe(${index}, '${item.id}', '${item.email || item.user}')">Resolve</button>` : '✅'}
                    </td>
                </tr>
            `;
        });

        document.getElementById('totalCount').innerText = total;
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('resolvedCount').innerText = resolved;
    }

    // 3. ACTION LOGIC (The Notification Trigger)
    function resolveMe(index, ticketId, userEmail) {
        // Step A: Update Status in Memory
        if(index < defaultComplaints.length) {
            defaultComplaints[index].status = "Resolved";
        } else {
            let userComplaints = JSON.parse(localStorage.getItem("allComplaints")) || [];
            let localIdx = index - defaultComplaints.length;
            if(userComplaints[localIdx]) {
                userComplaints[localIdx].status = "Resolved";
                localStorage.setItem("allComplaints", JSON.stringify(userComplaints));
            }
        }

        // Step B: BROADCAST SIGNAL (This is what triggers the User's Mobile Notification)
        const notificationData = {
            ticketId: ticketId,
            time: new Date().toLocaleTimeString(),
            targetUser: userEmail,
            status: "Resolved"
        };
        
        // localStorage 'setItem' is detected by all other open tabs (index.html)
        localStorage.setItem("mobileNotification", JSON.stringify(notificationData));

        // Step C: Provide Admin Feedback
        triggerAdminLog(ticketId, userEmail);

        // Step D: Refresh UI
        loadDashboard(); 
    }

    function triggerAdminLog(id, user) {
        const box = document.getElementById('notificationBox');
        const msg = document.getElementById('notiMsg');
        msg.innerHTML = `<i class="fas fa-check-circle" style="color:#0ca678"></i> <b>Success!</b><br>SMS Alert sent to <b>${user}</b> for ticket <b>#${id}</b>.`;
        
        box.style.right = "20px";
        setTimeout(() => { box.style.right = "-350px"; }, 4000);
    }

    // 4. THE LISTENER (For Demo: If Admin page is open, it also shows the alert)
    window.addEventListener('storage', (event) => {
        if (event.key === 'mobileNotification') {
            const data = JSON.parse(event.newValue);
            
            // This is the simulated "SMS" Alert
            alert("📱 MOBILE SMS RECEIVED\n----------------------\nTo: Citizen\nMsg: Your complaint #" + data.ticketId + " has been RESOLVED.\nTime: " + data.time);
            
            // Optional Sound
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');
            audio.play().catch(e => console.log("Sound muted by browser"));
        }
    });

    window.onload = loadDashboard;
</script>

</body>
</html>
