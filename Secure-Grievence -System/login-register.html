<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | Grievance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #001f3f; --white: #ffffff; }
        body { height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); display: flex; align-items: center; justify-content: center; }
        .main-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 20px; width: 800px; height: 500px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-container { position: absolute; width: 50%; height: 100%; transition: 0.6s ease-in-out; padding: 40px; color: white; text-align: center; box-sizing: border-box; }
        .sign-in-container { left: 0; z-index: 2; }
        .sign-up-container { left: 0; opacity: 0; z-index: 1; }
        .main-box.active .sign-in-container { transform: translateX(100%); opacity: 0; }
        .main-box.active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .overlay-container { position: absolute; top: 0; left: 50%; width: 50%; height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); transition: 0.6s; z-index: 100; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .main-box.active .overlay-container { transform: translateX(-100%); }
    </style>
</head>
<body>

<div class="main-box" id="mainBox">
    <div class="form-container sign-up-container">
        <form id="regForm">
            <h1>Create Account</h1>
            <input type="text" id="regName" placeholder="Full Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <div class="form-container sign-in-container">
        <form id="logForm">
            <h1>Sign In</h1>
            <input type="email" id="logEmail" placeholder="Email" required>
            <input type="password" id="logPass" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <div class="overlay-container">
        <h2 id="overlayTitle">Hello, Friend!</h2>
        <p id="overlayText">Don't have an account?</p>
        <button style="background:transparent; border: 1px solid white;" id="toggleBtn">Switch</button>
    </div>
</div>

<script>
    const mainBox = document.getElementById('mainBox');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', () => {
        mainBox.classList.toggle('active');
    });

    // Login Logic
    document.getElementById('logForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('logEmail').value;
        const password = document.getElementById('logPass').value;

        // Dummy Login Check (Connect to your Flask app.py here)
        // IF email is admin@gmail.com, we treat as admin
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userName", email.split('@')[0]);
        localStorage.setItem("isLoggedIn", "true");

        alert("Login Successful!");
        window.location.href = "index.html";
    });

    // Register Logic
    document.getElementById('regForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("Registration Successful! Please Login.");
        mainBox.classList.remove('active');
    });
</script>
</body>
</html>
